<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&amp;family=Plus+Jakarta+Sans:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#181512",
                        "surface-bright": "#fbf9f4",
                        "secondary-container": "#eddec6",
                        "inverse-surface": "#30312e",
                        "on-background": "#1b1c19",
                        "on-primary-fixed": "#1e1b18",
                        "surface-container-low": "#f5f3ee",
                        "on-tertiary-fixed-variant": "#4b463c",
                        "on-primary-container": "#96908b",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fbf9f4",
                        "on-error": "#ffffff",
                        "outline": "#7e756f",
                        "primary-fixed-dim": "#cdc5c0",
                        "error": "#ba1a1a",
                        "primary-fixed": "#e9e1dc",
                        "surface-container-high": "#eae8e3",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#4b4642",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e4e2dd",
                        "surface-variant": "#e4e2dd",
                        "secondary-fixed-dim": "#d3c5ae",
                        "on-secondary-fixed-variant": "#4f4534",
                        "surface-tint": "#635d5a",
                        "primary-container": "#2d2926",
                        "surface": "#fbf9f4",
                        "on-secondary-fixed": "#221a0c",
                        "inverse-on-surface": "#f2f1ec",
                        "on-secondary-container": "#6c614e",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#cdc5c0",
                        "tertiary-container": "#2d2920",
                        "secondary": "#685d4a",
                        "outline-variant": "#cfc4bd",
                        "tertiary": "#18150d",
                        "tertiary-fixed": "#eae2d4",
                        "on-surface-variant": "#4d4540",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#1b1c19",
                        "on-error-container": "#93000a",
                        "surface-dim": "#dbdad5",
                        "on-tertiary-container": "#969084",
                        "secondary-fixed": "#f0e0c9",
                        "on-tertiary-fixed": "#1e1b13",
                        "surface-container": "#f0eee9",
                        "tertiary-fixed-dim": "#cdc6b8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "gutter": "24px",
                        "article-max": "720px",
                        "container-max": "1120px",
                        "element-gap": "16px",
                        "section-gap": "80px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Newsreader"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-xl": ["Newsreader"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Newsreader"],
                        "label-caps": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.7", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fbf9f4;
        }
        ::placeholder {
            color: #cfc4bd;
        }
        textarea:focus, input:focus {
            outline: none;
        }
    </style>
</head>
<body class="bg-background text-on-surface">
<!-- TopAppBar -->
<nav class="w-full top-0 bg-stone-50 border-b border-stone-200">
<div class="max-w-[1120px] mx-auto flex justify-between items-center px-8 py-6">
<div class="text-2xl font-serif italic text-zinc-900">Mindful Reading</div>
<div class="hidden md:flex gap-10 items-center">
<a class="text-zinc-500 uppercase tracking-[0.15em] text-[11px] font-bold hover:text-zinc-900 transition-colors duration-200 scale-100 active:scale-95 transition-transform" href="#">Essays</a>
<a class="text-zinc-500 uppercase tracking-[0.15em] text-[11px] font-bold hover:text-zinc-900 transition-colors duration-200 scale-100 active:scale-95 transition-transform" href="#">Library</a>
<a class="text-zinc-500 uppercase tracking-[0.15em] text-[11px] font-bold hover:text-zinc-900 transition-colors duration-200 scale-100 active:scale-95 transition-transform" href="#">About</a>
<a class="text-zinc-900 font-bold border-b-2 border-zinc-900 pb-1 hover:text-zinc-900 transition-colors duration-200 scale-100 active:scale-95 transition-transform" href="#">Write</a>
</div>
<div class="flex items-center gap-6">
<button class="material-symbols-outlined text-zinc-900 scale-100 active:scale-95 transition-transform" data-icon="account_circle">account_circle</button>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="max-w-[1120px] mx-auto px-8 pt-16">
<div class="max-w-[720px] mx-auto">
<!-- Toolbar/Context Header -->
<div class="flex justify-between items-center mb-12 border-b border-secondary pb-4">
<div class="flex items-center gap-4">
<span class="font-label-caps text-label-caps text-secondary uppercase">Drafting</span>
<span class="w-1 h-1 rounded-full bg-secondary"></span>
<span class="font-label-caps text-label-caps text-outline uppercase tracking-widest">Unsaved changes</span>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 font-label-caps text-label-caps text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="image">image</span>
<span>Cover</span>
</button>
<button class="flex items-center gap-2 font-label-caps text-label-caps text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="settings">settings</span>
<span>Settings</span>
</button>
</div>
</div>
<!-- Writing Form -->
<form action="#" class="space-y-8">
<!-- Title Area -->
<div class="relative group">
<input class="w-full bg-transparent border-none p-0 font-headline-xl text-headline-xl placeholder-outline-variant focus:ring-0" placeholder="Title of your essay..." type="text"/>
</div>
<!-- Subtitle/Category Area (Minimalist Chip) -->
<div class="flex gap-3 items-center">
<div class="bg-surface-container px-3 py-1 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-secondary" data-icon="label">label</span>
<input class="bg-transparent border-none p-0 text-[11px] font-bold uppercase tracking-widest text-secondary focus:ring-0 placeholder-outline-variant w-32" placeholder="Add a category" type="text"/>
</div>
</div>
<!-- Featured Image Placeholder -->
<div class="relative w-full aspect-[21/9] bg-surface-container-high rounded-lg overflow-hidden group">
<img alt="Minimalist writing workspace with a notebook and pen on a light wooden table" class="w-full h-full object-cover opacity-20 group-hover:opacity-30 transition-opacity" data-alt="Top down view of a minimal white workspace with a fountain pen resting on a blank cream colored journal next to a ceramic cup of coffee" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDam0qeKqcKv0NxsYZWpgXdVH6OIMwsr_lLepm-Xck1jRCuXaeIsQSQZ8kt04PDd0XDOb4X64RBqNsUf6q_ST-_oTcWa8Abx1xXGVgslixpXVOrs84lDeSzXXVuivyQ81UmlHWETLqEM13--Pg8rtgmGPN99WxQ02KH0s1khbEu-13rirs3xyelLqHvYAbxIKryhiLI8o8JprErfUUacE9nlVj7sPJdynvPxMkuDEqUsM_QSD4-FlgWKuqlBjbhwe7iMbURJShQLJk"/>
<div class="absolute inset-0 flex flex-col items-center justify-center gap-2 cursor-pointer">
<span class="material-symbols-outlined text-outline text-3xl" data-icon="add_photo_alternate">add_photo_alternate</span>
<span class="font-label-caps text-label-caps text-outline uppercase">Add Cover Image</span>
</div>
</div>
<!-- Body Text Area -->
<div class="pt-4">
<textarea class="w-full min-h-[500px] bg-transparent border-none p-0 font-body-lg text-body-lg text-on-surface placeholder-outline-variant focus:ring-0 leading-relaxed resize-none" placeholder="Begin your story here..."></textarea>
</div>
<!-- Bottom Floating Actions -->
<div class="sticky bottom-12 flex justify-center pt-8">
<div class="bg-surface-container-highest/90 backdrop-blur-md px-6 py-4 rounded-full flex items-center gap-8 shadow-sm border border-stone-200">
<div class="flex items-center gap-4 text-secondary">
<button class="material-symbols-outlined hover:text-primary transition-colors" data-icon="format_bold" type="button">format_bold</button>
<button class="material-symbols-outlined hover:text-primary transition-colors" data-icon="format_italic" type="button">format_italic</button>
<button class="material-symbols-outlined hover:text-primary transition-colors" data-icon="format_quote" type="button">format_quote</button>
<button class="material-symbols-outlined hover:text-primary transition-colors" data-icon="link" type="button">link</button>
<div class="h-4 w-[1px] bg-outline-variant"></div>
<button class="material-symbols-outlined hover:text-primary transition-colors" data-icon="list" type="button">list</button>
</div>
<button class="bg-primary text-on-primary px-8 py-2.5 rounded-full font-label-caps text-label-caps uppercase tracking-widest hover:bg-zinc-800 transition-all active:scale-95 shadow-lg shadow-primary/10" type="submit">
                            Publish
                        </button>
</div>
</div>
</form>
</div>
</main>
<!-- Footer -->
<footer class="w-full border-t border-stone-200 mt-20 bg-stone-50">
<div class="max-w-[1120px] mx-auto flex flex-col md:flex-row justify-between items-center py-16 px-8 gap-8">
<div class="text-xl font-serif italic text-zinc-900">Mindful Reading</div>
<p class="font-serif text-sm text-zinc-600">© 2024 Mindful Reading. Crafted for the slow reader.</p>
<div class="flex gap-8">
<a class="text-zinc-500 uppercase tracking-widest text-[10px] hover:text-zinc-900 transition-all" href="#">Newsletter</a>
<a class="text-zinc-500 uppercase tracking-widest text-[10px] hover:text-zinc-900 transition-all" href="#">Archive</a>
<a class="text-zinc-500 uppercase tracking-widest text-[10px] hover:text-zinc-900 transition-all" href="#">Privacy</a>
<a class="text-zinc-500 uppercase tracking-widest text-[10px] hover:text-zinc-900 transition-all" href="#">Terms</a>
</div>
</div>
</footer>
</body></html>
