<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Draft - Mindful Reader</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Plus+Jakarta+Sans:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary": "#ffffff",
                      "error": "#ba1a1a",
                      "secondary": "#685d4a",
                      "primary-fixed-dim": "#cdc5c0",
                      "on-primary-container": "#96908b",
                      "outline-variant": "#cfc4bd",
                      "surface-bright": "#fbf9f4",
                      "on-surface": "#1b1c19",
                      "tertiary": "#18150d",
                      "on-surface-variant": "#4d4540",
                      "tertiary-fixed": "#eae2d4",
                      "on-error-container": "#93000a",
                      "on-tertiary-fixed": "#1e1b13",
                      "on-tertiary": "#ffffff",
                      "secondary-fixed-dim": "#d3c5ae",
                      "on-primary-fixed": "#1e1b18",
                      "primary": "#181512",
                      "inverse-on-surface": "#f2f1ec",
                      "error-container": "#ffdad6",
                      "surface-container": "#f0eee9",
                      "on-secondary-container": "#6c614e",
                      "outline": "#7e756f",
                      "inverse-surface": "#30312e",
                      "primary-container": "#2d2926",
                      "secondary-container": "#eddec6",
                      "background": "#fbf9f4",
                      "surface": "#fbf9f4",
                      "on-error": "#ffffff",
                      "tertiary-container": "#2d2920",
                      "on-secondary-fixed-variant": "#4f4534",
                      "surface-container-low": "#f5f3ee",
                      "tertiary-fixed-dim": "#cdc6b8",
                      "on-background": "#1b1c19",
                      "inverse-primary": "#cdc5c0",
                      "surface-container-highest": "#e4e2dd",
                      "on-tertiary-fixed-variant": "#4b463c",
                      "surface-container-lowest": "#ffffff",
                      "primary-fixed": "#e9e1dc",
                      "surface-tint": "#635d5a",
                      "on-secondary-fixed": "#221a0c",
                      "on-primary-fixed-variant": "#4b4642",
                      "surface-dim": "#dbdad5",
                      "surface-container-high": "#eae8e3",
                      "on-tertiary-container": "#969084",
                      "on-secondary": "#ffffff",
                      "secondary-fixed": "#f0e0c9",
                      "surface-variant": "#e4e2dd"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "article-max": "720px",
                      "section-gap": "80px",
                      "margin-mobile": "20px",
                      "gutter": "24px",
                      "element-gap": "16px",
                      "container-max": "1120px"
              },
              "fontFamily": {
                      "headline-lg": ["Newsreader"],
                      "label-caps": ["Plus Jakarta Sans"],
                      "headline-md": ["Newsreader"],
                      "headline-xl": ["Newsreader"],
                      "body-md": ["Plus Jakarta Sans"],
                      "body-lg": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "500"}],
                      "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}],
                      "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                      "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "1.7", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fbf9f4; /* Overriding default to ensure warm beige */
        }
        textarea::placeholder, input::placeholder {
            color: rgba(45, 41, 38, 0.3);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md selection:bg-secondary-container">
<!-- Top Navigation Bar -->
<header class="bg-[#FDFCFB] text-[#2D2926] border-b border-[#D6C7B0] sticky top-0 z-50 flex justify-between items-center w-full px-5 py-4">
<button class="transition-colors duration-300 ease-in-out hover:bg-[#D6C7B0]/10 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-serif italic text-lg tracking-tight">Mindful Reader</span>
<button class="bg-primary text-on-primary px-6 py-2 rounded-full font-label-caps text-label-caps hover:bg-primary-container transition-all active:scale-95 shadow-sm">
            Publish
        </button>
</header>
<main class="max-w-[720px] mx-auto px-margin-mobile pt-10 pb-32 min-h-screen">
<!-- Composition Area -->
<article class="flex flex-col gap-6">
<!-- Hidden context for accessibility -->
<label class="sr-only" for="post-title">Title of your post</label>
<input autocomplete="off" class="bg-transparent border-none focus:ring-0 w-full p-0 font-headline-xl text-headline-xl text-primary placeholder-primary/20 leading-tight" id="post-title" placeholder="Title" type="text"/>
<div class="flex items-center gap-2 mt-2">
<span class="bg-surface-container px-3 py-1 rounded-full font-label-caps text-label-caps text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="edit_note">edit_note</span>
                    DRAFT
                </span>
<span class="text-on-surface-variant/60 font-label-caps text-[10px] tracking-widest uppercase">
                    3 MIN READ • SAVED
                </span>
</div>
<div class="mt-8">
<label class="sr-only" for="post-content">Content of your post</label>
<textarea class="bg-transparent border-none focus:ring-0 w-full p-0 font-body-lg text-body-lg text-on-surface-variant min-h-[400px] resize-none leading-relaxed" id="post-content" placeholder="Begin your story here..."></textarea>
</div>
</article>
<!-- Decorative Image Placeholder (Optional/Visual) -->
<div class="mt-12 rounded-xl overflow-hidden aspect-[16/9] bg-surface-container-high border border-outline-variant/30 flex items-center justify-center">
<div class="text-center group cursor-pointer">
<span class="material-symbols-outlined text-4xl text-outline mb-2 group-hover:text-primary transition-colors" data-icon="add_a_photo">add_a_photo</span>
<p class="font-label-caps text-label-caps text-outline group-hover:text-primary transition-colors">Add a cover image</p>
</div>
</div>
</main>
<!-- Formatting Toolbar (Docked at bottom) -->
<div class="fixed bottom-0 left-0 w-full bg-[#FDFCFB]/95 backdrop-blur-md border-t border-[#D6C7B0] px-6 py-4 flex justify-between items-center z-50">
<div class="flex items-center gap-4 overflow-x-auto no-scrollbar">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="format_bold">format_bold</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="format_italic">format_italic</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="format_h2">format_h2</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="format_quote">format_quote</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="format_list_bulleted">format_list_bulleted</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="link">link</span>
</button>
<div class="w-px h-6 bg-outline-variant/40 mx-2"></div>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="image">image</span>
</button>
</div>
<div class="flex items-center gap-3">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</div>
<!-- Background Decorative Texture (Simulated through Gradient) -->
<div class="fixed inset-0 pointer-events-none opacity-20" style="background-image: radial-gradient(#2D2926 0.5px, transparent 0.5px); background-size: 24px 24px;">
</div>
</body></html>
