<!-- 모든 페이지의 공통 뼈대: 헤더(네비게이션), Tailwind 설정, 폰트 로딩, 푸터 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#181512",
                        "surface-bright": "#fbf9f4",
                        "secondary-container": "#eddec6",
                        "on-background": "#1b1c19",
                        "surface-container-low": "#f5f3ee",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fbf9f4",
                        "outline": "#7e756f",
                        "surface-container-high": "#eae8e3",
                        "on-surface-variant": "#4d4540",
                        "on-surface": "#1b1c19",
                        "surface-container-highest": "#e4e2dd",
                        "surface-variant": "#e4e2dd",
                        "secondary": "#685d4a",
                        "outline-variant": "#cfc4bd",
                        "surface-container": "#f0eee9",
                    },
                    fontFamily: {
                        "headline-lg": ["Newsreader", "serif"],
                        "body-md": ["Plus Jakarta Sans", "sans-serif"],
                        "headline-xl": ["Newsreader", "serif"],
                        "body-lg": ["Plus Jakarta Sans", "sans-serif"],
                        "headline-md": ["Newsreader", "serif"],
                        "label-caps": ["Plus Jakarta Sans", "sans-serif"],
                    },
                    fontSize: {
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.7", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    },
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { background-color: #fbf9f4; }
        textarea:focus, input:focus { outline: none; }
    </style>
    <title>{% block title %}Mindful Reading{% endblock %}</title>
</head>
<body class="bg-background text-on-surface font-body-md antialiased">
    <!-- 헤더: 사이트 로고와 네비게이션 링크 -->
    <header class="w-full top-0 border-b border-stone-200 bg-stone-50 z-50">
        <div class="max-w-[1120px] mx-auto flex justify-between items-center px-8 py-6">
            <a href="/" class="text-2xl font-serif italic text-zinc-900">Mindful Reading</a>
            <nav class="hidden md:flex items-center gap-8">
                <a class="{% if request.path == '/' %}text-zinc-900 font-bold border-b-2 border-zinc-900 pb-1{% else %}text-zinc-500 uppercase tracking-[0.15em] text-[11px] font-bold hover:text-zinc-900{% endif %} transition-colors duration-200" href="/">Essays</a>
                <a class="{% if request.path == '/write' %}text-zinc-900 font-bold border-b-2 border-zinc-900 pb-1{% else %}text-zinc-500 uppercase tracking-[0.15em] text-[11px] font-bold hover:text-zinc-900{% endif %} transition-colors duration-200" href="/write">Write</a>
            </nav>
        </div>
    </header>

    <!-- 각 페이지의 실제 내용이 들어가는 곳 -->
    {% block content %}{% endblock %}

    <!-- 푸터: 저작권 표시와 보조 링크 -->
    <footer class="w-full border-t border-stone-200 mt-20 bg-stone-50">
        <div class="max-w-[1120px] mx-auto flex flex-col md:flex-row justify-between items-center py-16 px-8 gap-8">
            <div class="flex flex-col items-center md:items-start gap-4">
                <span class="text-xl font-serif italic text-zinc-900">Mindful Reading</span>
                <p class="font-serif text-sm text-zinc-600">&copy; 2024 Mindful Reading. Crafted for the slow reader.</p>
            </div>
            <nav class="flex gap-8">
                <a class="text-zinc-500 uppercase tracking-widest text-[10px] font-bold hover:text-zinc-900 transition-all" href="#">Newsletter</a>
                <a class="text-zinc-500 uppercase tracking-widest text-[10px] font-bold hover:text-zinc-900 transition-all" href="#">Archive</a>
                <a class="text-zinc-500 uppercase tracking-widest text-[10px] font-bold hover:text-zinc-900 transition-all" href="#">Privacy</a>
            </nav>
        </div>
    </footer>
</body>
</html>
